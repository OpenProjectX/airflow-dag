services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${AIRFLOW_IMAGE_NAME:-local/airflow-dag-project:latest}
    env_file:
      - .env
    environment:
      AIRFLOW_REPO_ROOT: /opt/airflow/dags/repo
    depends_on:
      postgres:
        condition: service_healthy
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create
      --role Admin
      --username $${AIRFLOW_ADMIN_USERNAME:-admin}
      --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname $${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      --lastname $${AIRFLOW_ADMIN_LASTNAME:-Admin}
      --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      "
    volumes:
      - .:/opt/airflow/dags/repo
      - airflow-logs:/opt/airflow/logs

  airflow-webserver:
    image: ${AIRFLOW_IMAGE_NAME:-local/airflow-dag-project:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW_REPO_ROOT: /opt/airflow/dags/repo
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: ["airflow", "webserver"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - .:/opt/airflow/dags/repo
      - airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE_NAME:-local/airflow-dag-project:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW_REPO_ROOT: /opt/airflow/dags/repo
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: ["airflow", "scheduler"]
    volumes:
      - .:/opt/airflow/dags/repo
      - airflow-logs:/opt/airflow/logs

  airflow-cli:
    image: ${AIRFLOW_IMAGE_NAME:-local/airflow-dag-project:latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW_REPO_ROOT: /opt/airflow/dags/repo
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    entrypoint: ["bash", "-lc"]
    command: ["airflow info"]
    volumes:
      - .:/opt/airflow/dags/repo
      - airflow-logs:/opt/airflow/logs

volumes:
  postgres-db-volume:
  airflow-logs:
